# Server Port (Default: 8080)
server.port=8080

# --- Database configuration (MySQL) ---
# Replace with your actual database name, username, and password
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate settings ---
# 'update' automatically creates/updates database tables based on our Java classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- OpenAPI / Swagger configuration ---
# Where the Swagger documentation will be available
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Logging ---
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- Custom Properties ---
# Configurable GST (Initial: 18%)
app.tax.gst-rate=18.0
