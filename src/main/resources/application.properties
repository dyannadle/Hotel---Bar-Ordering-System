# --- Server Port (Default is 8080) ---
server.port=8080

# --- Database configuration (MySQL) ---
# Format: jdbc:mysql://[host]:[port]/[database_name]
# createDatabaseIfNotExist=true: Automatically creates the database if it doesn't exist yet.
# allowPublicKeyRetrieval=true: Required for newer MySQL authentication methods.
spring.datasource.url=jdbc:mysql://localhost:3306/hotel_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
# Your MySQL database username
spring.datasource.username=root
# Your MySQL database password (the one you provided)
spring.datasource.password=Deepak@2002
# The specific driver class used for MySQL 8+
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate settings ---
# ddl-auto=update: Hibernate will modify the existing database structure to match our Java entities.
spring.jpa.hibernate.ddl-auto=update
# show-sql=true: Prints the actual SQL queries being sent to the database in the console.
spring.jpa.show-sql=true
# The SQL dialect tells Hibernate how to format MySQL-specific commands.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- OpenAPI / Swagger configuration ---
# Where the Swagger documentation will be available
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Logging ---
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG


# --- Custom Properties ---
# Configurable GST (Initial: 18%)
app.tax.gst-rate=18.0

# --- JWT Configuration (Security) ---
# app.jwt.secret: A long string used to "sign" our tokens so they can't be tampered with.
app.jwt.secret=HotelBarOrderingSystemSecretKeyForJWTAuth2026!DeepakYannadle
# app.jwt.expiration-ms: How long the token lasts (12 hours = 43200000ms).
app.jwt.expiration-ms=43200000
